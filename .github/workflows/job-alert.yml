name: Daily Job Alert

on:
  schedule:
    - cron: '00 05 * * *'  # 9:00 AM GST (UTC+4 = 05:00 UTC)
    - cron: '00 11 * * *'  # 3:00 PM GST (UTC+4 = 11:00 UTC)
  workflow_dispatch:        # allows manual trigger too

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Call Claude API and get job alert content
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/fetch_alert.py

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Daily Job Alert - ${{ github.run_number }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: "Job Alert Bot <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            Hello,

            Here is your Daily Job Alert for today!

            ---

            ${{ steps.claude.outputs.message }}

            ---

            Workflow: ${{ github.workflow }}
            Run: #${{ github.run_number }}
            Repository: ${{ github.repository }}

            Stay motivated and keep applying!
            - Job Alert Automation Bot
